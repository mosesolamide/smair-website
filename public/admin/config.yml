backend:
  name: git-gateway
  branch: main

site_url: https://smair.netlify.app
display_url: https://smair.netlify.app

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    sortableFields: ["date", "title"]
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "Cover Image"
        name: "image"
        widget: "image"
        hint: "This shows on the blog card and at the top of the post."
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "smairfoundation" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "2 min read", hint: "e.g. \"3 min read\"" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Blogs & Newsletters", "newsletter", "smair bootcamp"]
        default: "Blogs & Newsletters"
      - { label: "Views", name: "views", widget: "number", default: 0, required: false, value_type: "int" }
      - label: "Likes (starting count)"
        name: "likes"
        widget: "number"
        default: 0
        required: false
        value_type: "int"
        hint: "Visitors who click the heart add +1 on top of this in their own browser."
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "stories"
    label: "Our Story Videos"
    label_singular: "Story Video"
    folder: "content/stories"
    create: true
    delete: true
    slug: "{{slug}}"
    sortableFields: ["date", "title"]
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "YouTube Link"
        name: "youtubeUrl"
        widget: "string"
        hint: "Paste the full YouTube video URL, e.g. https://www.youtube.com/watch?v=XXXXXXXXXXX"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Short Description", name: "description", widget: "text", required: false }

  - name: "upcoming"
    label: "Upcoming Events"
    label_singular: "Upcoming Event"
    folder: "content/upcoming"
    create: true
    delete: true
    slug: "{{slug}}"
    sortableFields: ["date", "title"]
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }

  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "content/testimonials"
    create: true
    delete: true
    slug: "{{fields.name}}"
    sortableFields: ["order", "name"]
    summary: "{{name}} — {{role}}"
    fields:
      - { label: "Quote", name: "quote", widget: "text", hint: "The full testimonial text, without quotation marks." }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string", hint: "e.g. \"Parent\", \"School Principal\", \"Student\"" }
      - label: "Order"
        name: "order"
        widget: "number"
        default: 1
        value_type: "int"
        hint: "Controls the order testimonials appear in the slider. Lower numbers show first."

  - name: "comments"
    label: "Comments"
    label_singular: "Comment"
    folder: "content/comments"
    create: true
    delete: true
    slug: "{{postSlug}}-{{fields.name}}-{{uuid}}"
    sortableFields: ["date", "postSlug"]
    summary: "{{name}} on {{postSlug}} — {{date}}"
    fields:
      - label: "Blog Post"
        name: "postSlug"
        widget: "relation"
        collection: "posts"
        search_fields: ["title"]
        display_fields: ["title"]
        value_field: "{{slug}}"
        hint: "Pick which blog post this comment belongs to. New visitor comments arrive in your Netlify Forms dashboard (Forms tab) — copy the approved ones in here to publish them."
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Comment", name: "comment", widget: "text" }
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
