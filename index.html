<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SMAIR helps students explore artificial intelligence, robotics, and programming through hands-on learning."
    />
    <title>SMAIR | AI and Robotics Learning</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Static form so Netlify's build bot can detect the "comments" form schema. Never rendered; the real form in CommentForm.tsx submits to this same form-name. -->
    <form name="comments" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="postSlug" />
      <input type="text" name="name" />
      <textarea name="comment"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
